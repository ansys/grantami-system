[tox]
description = Default tox environments list
envlist =
    style,tests,doc
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Checks for project unit tests and coverage (if desired)
basepython =
    tests310: python3.10
    tests311: python3.11
    tests312: python3.12
    tests313: python3.13
    {style,tests,doc}: python3
skip_install = true
allowlist_externals =
    uv
passenv =
    UV_INDEX_PYANSYS_PYPI_USERNAME
    UV_INDEX_PYANSYS_PYPI_PASSWORD
    GRANTA_MI_VERSION
setenv =
    PYTHONUNBUFFERED = yes
    PYTEST_EXTRA_ARGS = --mi-version={env:GRANTA_MI_SERVER_VERSION} --cov=ansys.grantami.system --cov-report=term --cov-report=xml:.cov/xml --cov-report=html:.cov/html
commands =
    uv sync --active
    uv run --no-sync --active pytest {env:PYTEST_MARKERS:} {env:PYTEST_EXTRA_ARGS:} {posargs:-vv}

[testenv:style]
description = Checks project code style
skip_install = true
allowlist_externals =
    uv
deps =
    pre-commit
commands =
    uv sync --active --inexact
    pre-commit run --all-files --show-diff-on-failure

[testenv:doc]
description = Check if documentation generates properly
skip_install = true
allowlist_externals =
    uv
passenv =
    BUILD_EXAMPLES
commands =
    uv sync --active --only-group doc
    uv run --active --no-sync sphinx-build -d "{toxworkdir}/doc_doctree" doc/source "{toxinidir}/doc/_build/html" --color -W -bhtml -n --keep-going